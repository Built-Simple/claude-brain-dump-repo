<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
    background: {{background}};
  }

  /* ─── LAYOUT ─── */
  .slide {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 80px;
    position: relative;
  }

  /* ─── DECORATIVE ELEMENTS ─── */
  .accent-bar {
    position: absolute;
    top: 0;
    left: 80px;
    width: 6px;
    height: 220px;
    background: {{accent}};
    border-radius: 0 0 4px 4px;
  }

  .dot-grid {
    position: absolute;
    bottom: 100px;
    right: 80px;
    width: 120px;
    height: 120px;
    background-image: radial-gradient(circle, {{accent}}55 1.5px, transparent 1.5px);
    background-size: 18px 18px;
    opacity: 0.5;
  }

  /* ─── SLIDE NUMBER ─── */
  .slide-num {
    position: absolute;
    top: 68px;
    right: 80px;
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: {{accent}};
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* ─── TAG / LABEL ─── */
  .tag {
    display: inline-block;
    background: {{accent}}22;
    color: {{accent}};
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 18px;
    border-radius: 4px;
    border: 1px solid {{accent}}44;
    margin-bottom: 32px;
    width: fit-content;
  }

  /* ─── HEADLINE ─── */
  .headline {
    font-family: 'Syne', sans-serif;
    font-size: {{headlineSize}}px;
    font-weight: 800;
    line-height: 1.08;
    color: {{textColor}};
    letter-spacing: -1px;
    margin-bottom: 40px;
  }

  .headline em {
    font-style: normal;
    color: {{accent}};
  }

  /* ─── BODY TEXT ─── */
  .body {
    font-size: 28px;
    font-weight: 300;
    line-height: 1.65;
    color: {{textColor}}cc;
    max-width: 820px;
  }

  /* ─── BULLET LIST ─── */
  .bullets {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .bullets li {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    font-size: 26px;
    font-weight: 400;
    line-height: 1.5;
    color: {{textColor}}dd;
  }

  .bullets li::before {
    content: '';
    flex-shrink: 0;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: {{accent}};
    margin-top: 12px;
  }

  /* ─── BIG STAT / CALLOUT ─── */
  .stat {
    font-family: 'Syne', sans-serif;
    font-size: 160px;
    font-weight: 800;
    line-height: 1;
    color: {{accent}};
    letter-spacing: -6px;
  }

  .stat-label {
    font-size: 28px;
    font-weight: 400;
    color: {{textColor}}99;
    margin-top: 12px;
    letter-spacing: 1px;
  }

  /* ─── FOOTER ─── */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .brand {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: {{textColor}}66;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .cta {
    font-size: 18px;
    font-weight: 500;
    color: {{accent}};
    letter-spacing: 1px;
  }

  /* ─── CONTENT AREA ─── */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-top: 60px;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="accent-bar"></div>
  <div class="dot-grid"></div>
  <div class="slide-num">{{slideNum}} / {{totalSlides}}</div>

  <div class="content">
    {{#if tag}}<div class="tag">{{tag}}</div>{{/if}}

    {{#if headline}}
    <div class="headline">{{{headline}}}</div>
    {{/if}}

    {{#if body}}
    <p class="body">{{body}}</p>
    {{/if}}

    {{#if bullets}}
    <ul class="bullets">
      {{#each bullets}}<li>{{this}}</li>{{/each}}
    </ul>
    {{/if}}

    {{#if stat}}
    <div class="stat">{{stat}}</div>
    <div class="stat-label">{{statLabel}}</div>
    {{/if}}
  </div>

  <div class="footer">
    <span class="brand">{{brand}}</span>
    {{#if isLastSlide}}<span class="cta">{{cta}}</span>{{/if}}
  </div>
</div>
</body>
</html>
